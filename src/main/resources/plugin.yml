name: SimpleEconomy
version: 1.0
api-version: '1.13'
main: local.simpleeconomy.SimpleEconomyPlugin
description: XP bottles and economy features
authors: [Dev]
depend: [LuckPerms]
softdepend: [Vault, SimpleFactions]

commands:
  xpbottle:
    description: Withdraw XP into a bottle
    usage: /xpbottle <amount>
    aliases: [xpb]
  banknote:
    description: Create or give redeemable bank notes
    usage: /banknote <amount> OR /banknote give <player> <amount>
  balance:
    description: Check your balance or another player's
    usage: /balance [player]
    aliases: [bal, money]
    default: true
  coinflip:
    description: 50/50 coin flip betting
    usage: /coinflip [amount|cancel]
  cf:
    description: 50/50 coin flip betting (shorthand)
    usage: /cf [amount|cancel]

permissions:
  simpleeconomy.balance.others:
    description: View other players' balances
    default: true
